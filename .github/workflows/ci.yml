name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, feat/**]

jobs:
  # ── Backend: TypeScript check ────────────────────────────────────────────────
  backend-typecheck:
    name: Backend — TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

  # ── Frontend: TypeScript check + Vite build ──────────────────────────────────
  frontend-build:
    name: Frontend — TypeScript + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check + Vite build
        run: npm run build
        env:
          # Use empty string so build doesn't fail on missing env var
          VITE_API_BASE_URL: ""

  # ── Docker: Build images (no push) ──────────────────────────────────────────
  docker-build:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [backend-typecheck, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: price-watch-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: false
          tags: price-watch-frontend:ci
          build-args: |
            VITE_API_BASE_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max
