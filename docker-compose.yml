services:
  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: pw-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-price_watch}
      MYSQL_USER: ${DB_USER:-price_watch}
      MYSQL_PASSWORD: ${DB_PASSWORD:-price_watch_dev}
    volumes:
      - pw-data:/var/lib/mysql
      - ./db/schema.mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (NestJS API) ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pw-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-price_watch}
      DB_USER: ${DB_USER:-price_watch}
      DB_PASSWORD: ${DB_PASSWORD:-price_watch_dev}
      DB_CONNECTION_LIMIT: ${DB_CONNECTION_LIMIT:-10}
      APP_HOST: 0.0.0.0
      APP_PORT: 4000
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    # Backend port is NOT exposed externally — nginx proxies /api/* internally.
    # Uncomment the line below for direct backend access (e.g. debug / curl):
    # ports:
    #   - "${APP_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Frontend (React + Vite → nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        # Empty string → relative URLs → nginx reverse proxy handles /api/*
        VITE_API_BASE_URL: ""
        VITE_KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
    container_name: pw-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${UI_PORT:-80}:80"

volumes:
  pw-data:
