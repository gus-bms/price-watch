services:
  mysql:
    image: mysql:8.0
    container_name: pw-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_NAME:-price_watch}
      MYSQL_USER: ${DB_USER:-price_watch}
      MYSQL_PASSWORD: ${DB_PASSWORD:-price_watch_dev}
    volumes:
      - pw-data:/var/lib/mysql
      - ./db/schema.mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pw-data:
